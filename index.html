<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Valentín ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="toggle" id="nightToggle">🌓</div>

<audio id="bgMusic" loop preload="auto">
  <source src="music/cancion.mp3" type="audio/mpeg">
</audio>

<div class="container" id="startPage">
  <h1>Maryuri Paola Rodriguez Guiza ❤️<br>¿Quieres ser mi San Valentín?</h1>
  <button id="yesBtn">Sí 💖</button>
  <button id="noBtn">No 😢</button>
</div>

<div class="container hidden" id="mainPage">
  <h2>Gracias por aceptar mi amor ❤️</h2>
  <div id="pointsDisplay">Puntos: 0</div>

  <div class="icon-grid">
    <div class="icon" onclick="openCalculator()">🧮</div>
    <div class="icon" onclick="openContract()">📜</div>
    <div class="icon" onclick="game1()">💘</div>
    <div class="icon" onclick="game2()">🎁</div>
    <div class="icon" onclick="game9()">🧩</div>
    <div class="icon" onclick="game4()">🎲</div>
    <div class="icon" onclick="game5()">❓</div>
    <div class="icon" onclick="game6()">🔢</div>
    <div class="icon" onclick="game10()">💌</div>
    <div class="icon" onclick="game11()">🔎</div>
    <div class="icon" onclick="game12()">⚡</div>
    <div class="icon" onclick="game13()">🪄</div>
    <div class="icon" onclick="game14()">📈</div>
    <div class="icon" onclick="game15()">✊</div>
    <div class="icon" onclick="game16()">🎯</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
